version: "3.9"
services:
  api:
    build: ./services/orchestrator-api
    env_file:
      - ./services/orchestrator-api/.env
    ports:
      - "8000:8000"
    working_dir: /app
  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
    env_file:
      - ./apps/web/.env
    command: sh -c "npm install && npm run dev"
    ports:
      - "3003:3000"
    depends_on:
      - api
